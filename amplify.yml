version: 1
backend:
  phases:
    build:
      commands:
        - rm -rf node_modules
        - npm ci --legacy-peer-deps
        - cd amplify && npx tsc && cd ..
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - cp -f amplify_outputs.json amplify/amplify_outputs.json || exit 1
frontend:
  phases:
    build:
      commands:
        - npm run build
  customHeaders:
    - pattern: "/index.html"
      headers:
        - key: "Cache-Control"
          value: "no-cache, no-store, must-revalidate"
    - pattern: "/"
      headers:
        - key: "Cache-Control"
          value: "no-cache, no-store, must-revalidate"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
